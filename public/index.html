    <!-- Suppress cross-origin SecurityErrors from third-party ad scripts
         trying to inspect the YouTube iframe. Must run before any module
         (including Vite's error overlay) so it intercepts first. -->
    <script>
      (function () {
        var PATTERNS = ['cross-origin', 'Permission denied to access property', 'cross origin'];
        function isSuppressed(msg) {
          if (!msg) return false;
          for (var i = 0; i < PATTERNS.length; i++) {
            if (msg.indexOf(PATTERNS[i]) !== -1) return true;
          }
          return false;
        }
        window.addEventListener('error', function (e) {
          if (isSuppressed(e.message)) { e.preventDefault(); e.stopImmediatePropagation(); return false; }
        }, true);          /* capture phase — fires before Vite's bubble-phase handler */
        window.addEventListener('unhandledrejection', function (e) {
          var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
          if (isSuppressed(msg)) { e.preventDefault(); }
        }, true);
      })();
    </script>
